<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Pendu Mythologique — La Savane des Jeux</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0D0A0E;
  --parchment: #F2E8D5;
  --parchment2:#E8D9BC;
  --gold:      #C9913A;
  --gold-light:#E8B45A;
  --gold-pale: #F5D88A;
  --crimson:   #8B1A1A;
  --crimson-l: #C03030;
  --ember:     #D4521A;
  --smoke:     #3A2E4A;
  --smoke-l:   #5A4A6A;
  --myst:      #1A1228;
  --myst2:     #251A38;
  --silver:    #B8B0C8;
  --green-ok:  #2A6B3A;
}

body {
  font-family: 'Crimson Text', Georgia, serif;
  background: var(--myst);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  color: var(--parchment);
}

/* ── BACKGROUND ATMOSPHERE ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(201,145,58,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(139,26,26,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(37,26,56,0.9) 0%, var(--myst) 100%);
  pointer-events: none;
  z-index: 0;
}

/* Stars / particles */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--gold-pale);
  border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite;
  opacity: 0;
}
@keyframes twinkle {
  0%,100% { opacity: 0; }
  50% { opacity: var(--o); }
}

/* ── BACK LINK ── */
.back-link {
  position: fixed; top: 1.25rem; left: 1.25rem;
  z-index: 100;
  display: flex; align-items: center; gap: 0.5rem;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-decoration: none;
  padding: 0.45rem 1rem;
  border: 1px solid rgba(201,145,58,0.3);
  border-radius: 30px;
  background: rgba(13,10,14,0.6);
  backdrop-filter: blur(8px);
  transition: all 0.2s;
}
.back-link:hover { border-color: var(--gold); background: rgba(201,145,58,0.1); }

/* ── HEADER ── */
.page-header {
  text-align: center;
  padding: 3.5rem 1rem 1.5rem;
  position: relative; z-index: 1;
}
.header-ornament {
  font-size: 0.75rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  font-family: 'Cinzel', serif;
  margin-bottom: 0.75rem;
  opacity: 0.7;
}
.page-title {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--gold-pale);
  letter-spacing: 0.05em;
  text-shadow: 0 0 40px rgba(201,145,58,0.4), 2px 2px 0 rgba(0,0,0,0.5);
  line-height: 1.1;
  margin-bottom: 0.5rem;
}
.page-subtitle {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  color: var(--silver);
  font-size: 1rem;
  opacity: 0.8;
}

/* ── SCORE BAR ── */
.score-bar {
  display: flex; justify-content: center; align-items: center;
  gap: 2rem; flex-wrap: wrap;
  padding: 0.75rem 2rem;
  margin: 0 auto 1rem;
  max-width: 700px;
  position: relative; z-index: 1;
}
.score-pill {
  display: flex; align-items: center; gap: 0.5rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,145,58,0.2);
  border-radius: 30px;
  padding: 0.4rem 1.1rem;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.06em;
  color: var(--silver);
}
.score-pill strong { color: var(--gold-pale); font-size: 1rem; }

/* ── MAIN GAME CONTAINER ── */
.game-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 1.25rem 3rem;
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  align-items: start;
}

@media (max-width: 660px) {
  .game-wrap { grid-template-columns: 1fr; }
}

/* ── LEFT PANEL: GALLOWS ── */
.gallows-panel {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,145,58,0.15);
  border-radius: 20px;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  backdrop-filter: blur(4px);
}

/* SVG Pendu */
#gallows-svg {
  width: 100%;
  max-width: 240px;
  height: 260px;
}

/* Flame lives */
.lives-row {
  display: flex; gap: 0.5rem; justify-content: center;
}
.flame {
  font-size: 1.5rem;
  transition: all 0.4s;
  filter: drop-shadow(0 0 6px rgba(212,82,26,0.8));
}
.flame.dead {
  filter: none;
  opacity: 0.2;
  font-size: 1rem;
  transform: rotate(180deg);
}
.lives-label {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--silver);
  opacity: 0.6;
  text-transform: uppercase;
}

/* Category / hint */
.category-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: rgba(201,145,58,0.1);
  border: 1px solid rgba(201,145,58,0.3);
  border-radius: 20px;
  padding: 0.3rem 1rem;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  color: var(--gold);
  text-transform: uppercase;
}

.hint-text {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: 0.88rem;
  color: var(--silver);
  text-align: center;
  opacity: 0.75;
  max-width: 220px;
  line-height: 1.5;
}

/* ── RIGHT PANEL: WORD + KEYBOARD ── */
.word-panel {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* Word display */
.word-display {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  justify-content: center;
  padding: 1.5rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,145,58,0.15);
  border-radius: 16px;
  min-height: 90px;
  align-items: flex-end;
}
.letter-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.letter-char {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 1.6rem;
  color: var(--gold-pale);
  width: 28px;
  text-align: center;
  min-height: 2rem;
  line-height: 1;
  transition: all 0.3s;
  animation: none;
}
.letter-char.reveal {
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.letter-char.space-char { width: 16px; }
.letter-line {
  width: 28px;
  height: 2px;
  background: rgba(201,145,58,0.4);
  border-radius: 2px;
}
.letter-slot.is-space .letter-line { opacity: 0; }

/* Keyboard */
.keyboard {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(201,145,58,0.12);
  border-radius: 16px;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.key-row {
  display: flex;
  gap: 0.35rem;
  justify-content: center;
  flex-wrap: wrap;
}
.key {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid rgba(201,145,58,0.3);
  background: rgba(201,145,58,0.07);
  color: var(--gold-pale);
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.key:hover:not(:disabled) {
  background: rgba(201,145,58,0.2);
  border-color: var(--gold);
  transform: scale(1.1);
}
.key:disabled { cursor: not-allowed; }
.key.hit {
  background: rgba(42,107,58,0.3);
  border-color: var(--green-ok);
  color: #6FCF97;
}
.key.miss {
  background: rgba(139,26,26,0.3);
  border-color: var(--crimson);
  color: #E07070;
  text-decoration: line-through;
}

/* ── REVEAL CARD ── */
.reveal-overlay {
  position: fixed; inset: 0;
  background: rgba(13,10,14,0.85);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s;
}
.reveal-overlay.show { opacity: 1; pointer-events: all; }

.reveal-card {
  background: linear-gradient(160deg, #1E1530 0%, #0D0A0E 100%);
  border: 1px solid rgba(201,145,58,0.4);
  border-radius: 24px;
  max-width: 540px;
  width: 100%;
  padding: 2.5rem 2rem;
  position: relative;
  transform: scale(0.85) translateY(30px);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  overflow: hidden;
}
.reveal-overlay.show .reveal-card {
  transform: scale(1) translateY(0);
}
.reveal-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(201,145,58,0.08) 0%, transparent 60%);
  pointer-events: none;
}

.reveal-status {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 0.75rem;
}
.reveal-status.win  { color: var(--gold); }
.reveal-status.lose { color: var(--crimson-l); }

.reveal-emoji { font-size: 4rem; text-align: center; margin-bottom: 0.75rem; }

.reveal-name {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--gold-pale);
  text-align: center;
  margin-bottom: 0.5rem;
  text-shadow: 0 0 30px rgba(201,145,58,0.4);
}

.reveal-origin {
  display: flex; align-items: center; gap: 0.75rem; justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
}
.reveal-tag {
  background: rgba(201,145,58,0.12);
  border: 1px solid rgba(201,145,58,0.3);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  padding: 3px 12px;
  border-radius: 20px;
}

.reveal-divider {
  width: 60px; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 0 auto 1.25rem;
}

.reveal-desc {
  font-family: 'Crimson Text', serif;
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--parchment);
  text-align: center;
  margin-bottom: 1.5rem;
}

.reveal-detail {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,145,58,0.1);
  border-radius: 12px;
  padding: 0.9rem 1.1rem;
  margin-bottom: 1.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.reveal-fact {
  display: flex; flex-direction: column; gap: 2px;
}
.reveal-fact-label {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--gold);
  opacity: 0.7;
  text-transform: uppercase;
}
.reveal-fact-value {
  font-family: 'Crimson Text', serif;
  font-size: 0.9rem;
  color: var(--parchment);
}

.reveal-btn {
  display: block; width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--gold), var(--ember));
  color: var(--ink);
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.reveal-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

/* ── GAME OVER MESSAGE (word reveal on lose) ── */
.answer-reveal {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--crimson-l);
  text-align: center;
  margin-bottom: 0.5rem;
}
.answer-word {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: 1.5rem;
  color: var(--gold-pale);
  text-align: center;
  margin-bottom: 1rem;
}

/* ── NEW GAME BTN ── */
.new-game-btn {
  display: block; width: 100%;
  padding: 0.7rem;
  background: transparent;
  border: 1px solid rgba(201,145,58,0.4);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 0.5rem;
}
.new-game-btn:hover { background: rgba(201,145,58,0.1); border-color: var(--gold); }

/* ── PROGRESS / COUNTER ── */
.counter-text {
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--silver);
  opacity: 0.5;
  text-align: center;
}

/* Shake animation on wrong */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
.shake { animation: shake 0.4s ease; }

/* Win glow */
@keyframes winGlow {
  0%,100% { text-shadow: 0 0 20px rgba(201,145,58,0.4); }
  50% { text-shadow: 0 0 60px rgba(201,145,58,0.9), 0 0 100px rgba(232,180,90,0.4); }
}
.win-glow { animation: winGlow 1.5s ease infinite; }

</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<a href="index.html" class="back-link">← Retour au Hub</a>

<div class="page-header">
  <div class="header-ornament">✦ La Savane des Jeux ✦</div>
  <h1 class="page-title">Le Pendu Mythologique</h1>
  <p class="page-subtitle">Déchiffre le nom de la créature avant que la flamme ne s'éteigne…</p>
</div>

<div class="score-bar">
  <div class="score-pill">🏆 Score <strong id="score-val">0</strong></div>
  <div class="score-pill">🔥 Streak <strong id="streak-val">0</strong></div>
  <div class="score-pill">📜 Créature <strong id="count-val">1</strong> / 20</div>
</div>

<div class="game-wrap">

  <!-- LEFT: Gallows + lives -->
  <div class="gallows-panel">

    <svg id="gallows-svg" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
      <!-- Structure potence (toujours visible) -->
      <!-- Base -->
      <line x1="20" y1="220" x2="120" y2="220" stroke="#C9913A" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <!-- Poteau vertical -->
      <line x1="60" y1="220" x2="60" y2="20" stroke="#C9913A" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <!-- Bras horizontal -->
      <line x1="60" y1="20" x2="140" y2="20" stroke="#C9913A" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <!-- Corde -->
      <line x1="140" y1="20" x2="140" y2="48" stroke="#C9913A" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <!-- Diagonal support -->
      <line x1="60" y1="50" x2="100" y2="20" stroke="#C9913A" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

      <!-- Symboles runiques décoratifs -->
      <text x="25" y="200" font-size="11" fill="rgba(201,145,58,0.25)" font-family="serif">ᚱ</text>
      <text x="90" y="210" font-size="11" fill="rgba(201,145,58,0.25)" font-family="serif">ᚢ</text>
      <text x="45" y="130" font-size="9" fill="rgba(201,145,58,0.15)" font-family="serif">ᛗ</text>

      <!-- Parties du bonhomme (cachées par défaut) -->
      <!-- 0: tête -->
      <circle id="h-head" cx="140" cy="63" r="15" stroke="#E8D9BC" stroke-width="2.5" fill="none" opacity="0" style="transition:opacity 0.5s"/>
      <!-- 1: corps -->
      <line id="h-body" x1="140" y1="78" x2="140" y2="145" stroke="#E8D9BC" stroke-width="2.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.5s"/>
      <!-- 2: bras gauche -->
      <line id="h-arm-l" x1="140" y1="95" x2="113" y2="120" stroke="#E8D9BC" stroke-width="2.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.5s"/>
      <!-- 3: bras droit -->
      <line id="h-arm-r" x1="140" y1="95" x2="167" y2="120" stroke="#E8D9BC" stroke-width="2.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.5s"/>
      <!-- 4: jambe gauche -->
      <line id="h-leg-l" x1="140" y1="145" x2="113" y2="180" stroke="#E8D9BC" stroke-width="2.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.5s"/>
      <!-- 5: jambe droite -->
      <line id="h-leg-r" x1="140" y1="145" x2="167" y2="180" stroke="#E8D9BC" stroke-width="2.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.5s"/>
    </svg>

    <div>
      <div class="lives-label" style="text-align:center;margin-bottom:0.4rem">Vies restantes</div>
      <div class="lives-row" id="lives-row"></div>
    </div>

    <div class="category-badge" id="cat-badge">⚗️ Mythologie</div>
    <div class="hint-text" id="hint-text">Indice : chargement…</div>
    <div class="counter-text" id="wrong-count">0 erreur(s)</div>

  </div>

  <!-- RIGHT: Word + Keyboard -->
  <div class="word-panel">

    <div class="word-display" id="word-display"></div>

    <div class="keyboard" id="keyboard"></div>

    <button class="new-game-btn" id="new-game-btn" onclick="newGame()">⚔ Nouvelle créature</button>

  </div>
</div>

<!-- REVEAL OVERLAY -->
<div class="reveal-overlay" id="reveal-overlay">
  <div class="reveal-card" id="reveal-card">
    <div class="reveal-status" id="reveal-status"></div>
    <div class="reveal-emoji" id="reveal-emoji"></div>
    <div class="reveal-name" id="reveal-name"></div>
    <div class="reveal-origin" id="reveal-origin"></div>
    <div class="reveal-divider"></div>
    <div class="reveal-desc" id="reveal-desc"></div>
    <div class="reveal-detail" id="reveal-detail"></div>
    <button class="reveal-btn" id="reveal-btn" onclick="closeReveal()">⚔ Continuer l'aventure</button>
  </div>
</div>

const CREATURES = [

  {

// ══════════════════════════════════════════════
const MAX_ERRORS = 6;
const BODY_PARTS = ['h-head','h-body','h-arm-l','h-arm-r','h-leg-l','h-leg-r'];

let usedIndices = [];
let currentCreature = null;
let guessed = [];
let errors = 0;
let gameOver = false;
let score = 0;
let streak = 0;
let creatureCount = 0;

// ══════════════════════════════════════════════
//  ÉTOILES DE FOND
// ══════════════════════════════════════════════
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2 + Math.random()*4}s;
      --o:${0.3 + Math.random()*0.6};
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(s);
  }
})();

// ══════════════════════════════════════════════
//  CLAVIER
// ══════════════════════════════════════════════
const ROWS = ['AZERTYUIOP', 'QSDFGHJKLM', 'WXCVBN'];

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ROWS.forEach(row => {
    const div = document.createElement('div');
    div.className = 'key-row';
    [...row].forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.id = 'key-' + letter;
      btn.textContent = letter;
      btn.onclick = () => guess(letter);
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

// ══════════════════════════════════════════════
//  VIES
// ══════════════════════════════════════════════
function renderLives() {
  const row = document.getElementById('lives-row');
  row.innerHTML = '';
  for (let i = 0; i < MAX_ERRORS; i++) {
    const span = document.createElement('span');
    span.className = 'flame' + (i >= MAX_ERRORS - errors ? ' dead' : '');
    span.textContent = '🔥';
    row.appendChild(span);
  }
}

// ══════════════════════════════════════════════
//  MOT
// ══════════════════════════════════════════════
function renderWord() {
  const display = document.getElementById('word-display');
  display.innerHTML = '';
  [...currentCreature.word].forEach(ch => {
    const slot = document.createElement('div');
    slot.className = 'letter-slot' + (ch === ' ' ? ' is-space' : '');
    const char = document.createElement('div');
    char.className = 'letter-char' + (ch === ' ' ? ' space-char' : '');
    if (ch === ' ' || guessed.includes(ch)) {
      char.textContent = ch === ' ' ? ' ' : ch;
    }
    const line = document.createElement('div');
    line.className = 'letter-line';
    slot.appendChild(char);
    slot.appendChild(line);
    display.appendChild(slot);
  });
}

// ══════════════════════════════════════════════
//  PENDU SVG
// ══════════════════════════════════════════════
function renderGallows() {
  BODY_PARTS.forEach((id, i) => {
    document.getElementById(id).style.opacity = i < errors ? '1' : '0';
  });
}

// ══════════════════════════════════════════════
//  GUESS
// ══════════════════════════════════════════════
function guess(letter) {
  if (gameOver || guessed.includes(letter)) return;
  guessed.push(letter);

  const btn = document.getElementById('key-' + letter);
  const wordLetters = [...currentCreature.word].filter(c => c !== ' ');

  if (wordLetters.includes(letter)) {
    btn.classList.add('hit');
    btn.disabled = true;
    // Reveal with animation
    renderWordAnimated(letter);
    checkWin();
  } else {
    errors++;
    btn.classList.add('miss');
    btn.disabled = true;
    renderGallows();
    renderLives();
    document.getElementById('wrong-count').textContent = errors + ' erreur(s)';
    // Shake
    document.getElementById('word-display').classList.remove('shake');
    void document.getElementById('word-display').offsetWidth;
    document.getElementById('word-display').classList.add('shake');
    checkLose();
  }
}

function renderWordAnimated(newLetter) {
  const display = document.getElementById('word-display');
  display.querySelectorAll('.letter-char').forEach((el, i) => {
    const ch = currentCreature.word[i];
    if (ch === newLetter && el.textContent !== ch) {
      el.textContent = ch;
      el.classList.add('reveal');
      setTimeout(() => el.classList.remove('reveal'), 400);
    }
  });
}

// ══════════════════════════════════════════════
//  WIN / LOSE
// ══════════════════════════════════════════════
function checkWin() {
  const allRevealed = [...currentCreature.word].every(c => c === ' ' || guessed.includes(c));
  if (!allRevealed) return;
  gameOver = true;
  score += Math.max(10, 50 - errors * 8);
  streak++;
  creatureCount++;
  updateScoreBar();
  setTimeout(() => showReveal(true), 600);
}

function checkLose() {
  if (errors < MAX_ERRORS) return;
  gameOver = true;
  streak = 0;
  creatureCount++;
  updateScoreBar();
  // Reveal full word
  renderWord();
  setTimeout(() => showReveal(false), 600);
}

function updateScoreBar() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('streak-val').textContent = streak;
  document.getElementById('count-val').textContent = Math.min(creatureCount, 20);
}

// ══════════════════════════════════════════════
//  REVEAL OVERLAY
// ══════════════════════════════════════════════
function showReveal(win) {
  const c = currentCreature;
  document.getElementById('reveal-status').textContent = win ? '✦ Bien joué, explorateur ! ✦' : '☽ La créature n\'a pas été identifiée…';
  document.getElementById('reveal-status').className = 'reveal-status ' + (win ? 'win' : 'lose');
  document.getElementById('reveal-emoji').textContent = c.emoji;
  document.getElementById('reveal-name').textContent = c.name;
  document.getElementById('reveal-name').className = 'reveal-name' + (win ? ' win-glow' : '');

  // Origin tags
  const orig = document.getElementById('reveal-origin');
  orig.innerHTML = `
    <span class="reveal-tag">${c.category}</span>
    <span class="reveal-tag">📅 ${c.period}</span>
    <span class="reveal-tag">🐾 ${c.type}</span>
  `;

  // If lose, show answer first
  if (!win) {
    const answerDiv = document.createElement('div');
    answerDiv.innerHTML = `<div class="answer-reveal">Le mot était :</div><div class="answer-word">${c.word}</div>`;
    document.getElementById('reveal-desc').insertAdjacentElement('beforebegin', answerDiv);
  }

  document.getElementById('reveal-desc').textContent = c.desc;

  // Facts grid
  const det = document.getElementById('reveal-detail');
  det.innerHTML = c.facts.map(f => `
    <div class="reveal-fact">
      <span class="reveal-fact-label">${f.l}</span>
      <span class="reveal-fact-value">${f.v}</span>
    </div>
  `).join('');

  document.getElementById('reveal-btn').textContent = '⚔ Créature suivante';
  document.getElementById('reveal-overlay').classList.add('show');
}

function closeReveal() {
  document.getElementById('reveal-overlay').classList.remove('show');
  // Remove any injected answer div
  const old = document.querySelector('.answer-reveal');
  if (old) old.parentNode.removeChild(old.nextElementSibling || old);
  const old2 = document.querySelector('.answer-word');
  if (old2) old2.parentNode.removeChild(old2);
  newGame();
}

// ══════════════════════════════════════════════
//  NEW GAME
// ══════════════════════════════════════════════
function pickCreature() {
  if (usedIndices.length >= CREATURES.length) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * CREATURES.length); }
  while (usedIndices.includes(idx));
  usedIndices.push(idx);
  return CREATURES[idx];
}

function newGame() {
  currentCreature = pickCreature();
  guessed = [];
  errors = 0;
  gameOver = false;

  document.getElementById('cat-badge').textContent = currentCreature.category;
  document.getElementById('hint-text').textContent = '💡 ' + currentCreature.hint;
  document.getElementById('wrong-count').textContent = '0 erreur(s)';

  buildKeyboard();
  renderWord();
  renderGallows();
  renderLives();
}

// ── INIT ──
newGame();

// Keyboard physical
document.addEventListener('keydown', e => {
  const letter = e.key.toUpperCase();
  if (/^[A-Z]$/.test(letter)) guess(letter);
});
</script>
